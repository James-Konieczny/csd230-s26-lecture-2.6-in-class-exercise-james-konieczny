<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>Magazine Form</title></head>
<body>
<h1>Add New Magazine</h1>
<form th:action="@{/magazine/add}" th:object="${magazine}" method="post">
    <input type="hidden" th:field="*{id}" />
    <label>Title: <input type="text" th:field="*{title}" required /></label><br/>
    <label>Current Issue: <input type="text" th:field="*{currentIssue}" required /></label><br/>
    <label>Price: <input type="number" step="0.01" th:field="*{price}" required /></label><br/>
    <label>Copies: <input type="number" th:field="*{copies}" required /></label><br/>
    <label>Order Quantity: <input type="number" th:field="*{orderQty}" required /></label><br/>
    <button type="submit">Save Magazine</button>
</form>
<br/>
<a th:href="@{/magazine}">Back to Magazine List</a>
</body>
</html>
