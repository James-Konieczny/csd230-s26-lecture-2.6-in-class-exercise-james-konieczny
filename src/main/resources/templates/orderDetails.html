<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><title>Your Shopping Cart</title></head>
<body>
<h1>Order Confirmation</h1>
<p>Thank you for your purchase!</p>
<h2>Order Information</h2> <p>
    <strong>Order ID:</strong> <span th:text="${order.id}"></span> </p> <p>
    <strong>Order Date:</strong> <span th:text="${order.orderDate}"></span> </p> <p>
    <strong>Total Amount:</strong> $<span th:text="${order.totalAmount}"></span> </p>
<h2>Purchased Items</h2>
<table border="1">
    <thead>
    <tr>
        <th>Item</th>
        <th>Type</th>
        <th>Price</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${order.products}">
        <td>
            <!-- Conditional rendering based on Class Type -->
            <span th:if="${product instanceof T(csd230.s26.lab1.entities.PublicationEntity)}"
                  th:text="${product.title}"></span>
            <span th:if="${product instanceof T(csd230.s26.lab1.entities.TicketEntity)}"
                  th:text="${product.description}"></span>
        </td>
        <td th:text="${product.productType}"></td>
        <td th:text="${'$' + product.price}"></td>
    </tr>
    </tbody>
</table>
<br>
<a th:href="@{/books}">Continue Shopping</a>
</body>
</html>
